name: Shift Planner DevOps Pipeline

on:
  workflow_dispatch:
    inputs:
      stage:
        description: "Select pipeline stage"
        required: true
        type: choice
        default: all
        options:
          - build
          - test
          - deploy
          - all

jobs:

# =========================
# 1. BUILD STAGE
# =========================
  build:
    if: ${{ github.event.inputs.stage == 'build' || github.event.inputs.stage == 'all' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Image
        run: docker build -t backend:latest ./server

      - name: Build Frontend Image
        run: docker build -t frontend:latest ./client


# =========================
# 2. TEST STAGE
# =========================
  test:
    if: ${{ github.event.inputs.stage == 'test' || github.event.inputs.stage == 'all' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json

      # =========================
      # BACKEND
      # =========================
      - name: Install Backend Dependencies
        working-directory: ./server
        run: npm ci

      - name: Run Backend Tests
        working-directory: ./server
        run: npm test || true

      # =========================
      # FRONTEND
      # =========================
      - name: Install Frontend Dependencies
        working-directory: ./client
        run: npm ci

      - name: Build Frontend
        working-directory: ./client
        run: npm run build


# =========================
# 3. DEPLOY STAGE
# =========================
  deploy:
    if: ${{ github.event.inputs.stage == 'deploy' || github.event.inputs.stage == 'all' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # =========================
      # LOGIN TO GHCR
      # =========================
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # =========================
      # BUILD & PUSH IMAGES
      # =========================
      - name: Build & Push Backend
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/shift-backend:latest ./server
          docker push ghcr.io/${{ github.repository_owner }}/shift-backend:latest

      - name: Build & Push Frontend
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/shift-frontend:latest ./client
          docker push ghcr.io/${{ github.repository_owner }}/shift-frontend:latest

      # =========================
      # AWS AUTH (OIDC)
      # =========================
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: arn:aws:iam::948580599921:role/TadbirRole

      # =========================
      # CONNECT TO EKS
      # =========================
      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name mern-cluster

      # =========================
      # DEPLOY TO K8S
      # =========================
      - name: Deploy to EKS
        run: kubectl apply -f k8s/
