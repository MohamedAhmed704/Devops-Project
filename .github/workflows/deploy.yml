name: Shift Planner DevOps Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # Checkout Code
      # =========================
      - name: Checkout Code
        uses: actions/checkout@v4

      # =========================
      # Login to GHCR
      # =========================
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # =========================
      # Convert OWNER to lowercase (IMPORTANT FIX)
      # =========================
      - name: Set lowercase owner
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      # =========================
      # Build & Push Backend
      # =========================
      - name: Build Backend Image
        run: |
          docker build -t ghcr.io/$OWNER/backend-app:latest ./server
          docker push ghcr.io/$OWNER/backend-app:latest

      # =========================
      # Build & Push Frontend
      # =========================
      - name: Build Frontend Image
        run: |
          docker build -t ghcr.io/$OWNER/frontend-app:latest ./client
          docker push ghcr.io/$OWNER/frontend-app:latest

      # =========================
      # AWS AUTH (OIDC)
      # =========================
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: arn:aws:iam::948580599921:role/TadbirRole

      # =========================
      # Setup kubectl
      # =========================
      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      # =========================
      # Setup Helm
      # =========================
      - name: Setup Helm
        uses: azure/setup-helm@v4

      # =========================
      # Update kubeconfig
      # =========================
      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name mern-cluster --region us-east-1

      # =========================
      # Deploy with Helm
      # =========================
      - name: Deploy with Helm
        run: |
          helm upgrade --install shift-planner ./shift-planner
